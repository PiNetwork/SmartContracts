name: Subscription Contract CI

on:
  pull_request:
    paths:
      - "contracts/subscription/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/subscription-contract-ci.yml"
  push:
    branches:
      - main
      - fix/subscription-batch-and-pagination
    paths:
      - "contracts/subscription/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/subscription-contract-ci.yml"

permissions:
  contents: read

jobs:
  test-subscription:
    name: Test subscription contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: swatinem/rust-cache@v2

      - name: Add wasm target
        run: rustup target add wasm32v1-none

      - name: Build subscription wasm
        run: cargo build -p subscription --target wasm32v1-none --release

      - name: Run tests
        run: cargo test -p subscription
